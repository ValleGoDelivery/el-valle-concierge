<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thank You | El Valle Concierge</title>
  <meta name="description" content="Thank you for contacting El Valle Concierge. We will review your request and respond shortly.">
  <link rel="canonical" href="https://elvalleconcierge.com/thank-you/">
  <meta name="robots" content="noindex,follow">
  <meta name="theme-color" content="#3d4a3f">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    :root{--sage:#3d4a3f;--gold:#c8a16a;--cream:#f7f4ee;--earth:#6d5a46;--ink:#243027;--white:#fffdf8}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:28px;color:var(--ink);background:linear-gradient(90deg,rgba(36,48,39,.86),rgba(36,48,39,.58)),url("../el-valle-hero.png") center/cover no-repeat;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .card{width:min(720px,100%);padding:42px;border-radius:10px;background:rgba(255,253,248,.94);box-shadow:0 24px 70px rgba(0,0,0,.28);text-align:center}
    img{width:min(330px,100%);border-radius:8px;background:var(--cream);box-shadow:0 12px 30px rgba(61,74,63,.14)}
    h1{margin:28px 0 14px;color:var(--sage);font-family:Georgia,"Times New Roman",serif;font-size:clamp(2.3rem,6vw,4.2rem);line-height:1;font-weight:500}
    p{margin:0 auto 24px;max-width:560px;color:var(--earth);font-size:1.08rem;line-height:1.6}
    .actions{display:flex;flex-wrap:wrap;justify-content:center;gap:12px}
    a{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:13px 19px;border-radius:999px;text-decoration:none;font-weight:900}
    .primary{color:var(--ink);background:var(--gold)}
    .secondary{color:var(--white);background:var(--sage)}
  </style>
</head>
<body>
  <main class="card">
    <img src="../el-valle-concierge-logo.png" alt="El Valle Concierge - Powered by Valle Go">
    <h1>Thank you.</h1>
    <p>Your request has been sent to El Valle Concierge. We will review it and respond shortly.</p>
    <div class="actions">
      <a class="primary" href="/">Return Home</a>
      <a class="secondary" href="/relocation-guide/">Read the Relocation Guide</a>
    </div>
  </main>
</body>
</html>
